<!DOCTYPE html>
<html xml:lang="es">
  <head>
    <title>Totalizador de ventas</title>
  </head>
  <body>
    <h1>Totalizador de Venta</h1>

  <form id="cantidad-form">
  <label>
    Cantidad de items:
    <input type="number" id="cantidad-items" />
  </label>

<br><br>

  <label>
    Precio por item:
    <input type="number" id="precio-item" /> 
  </label>

<br><br>

<label>
  Peso volumétrico por unidad:
  <input type="number" id="peso-volumetrico" />
</label>

<br><br>

  <label>
    Estado:
    <select id="estado">
      <option value="CA">CA</option>
      <option value="UT">UT</option>
      <option value="NV">NV</option>
      <option value="TX">TX</option>
      <option value="AL">AL</option>
    </select>
  </label>

  <br><br>
  <label>
  Categoría de producto:
  <select id="categoria">
    <option value="varios">Varios</option>
    <option value="alimentos">Alimentos</option>
    <option value="material">Material de escritorio</option>
    <option value="electronicos">Electrónicos</option>
    <option value="muebles">Muebles</option>
    <option value="vestimenta">Vestimenta</option>
    <option value="alcohol">Bebidas alcohólicas</option>
  </select>
  </label>

<br><br>

<label>
  Tipo de cliente:
  <select id="cliente">
    <option value="normal">Normal</option>
    <option value="recurrente">Recurrente</option>
    <option value="antiguo">Antiguo Recurrente</option>
    <option value="especial">Especial</option>
  </select>
</label>

<br><br>
  <button type="submit">Calcular</button>
</form>

<br>
<div id="resultado"></div>

<script type="module" src="./src/presenter.js"></script>
  </body>
</html>
