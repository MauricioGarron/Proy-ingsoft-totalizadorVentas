<!DOCTYPE html>
<html xml:lang="es">
  <head>
    <title>Totalizador de ventas</title>
  </head>
  <body>
    <h1>Totalizador de Venta</h1>

  <form id="cantidad-form">
  <label>
    Cantidad de items:
    <input type="number" id="cantidad-items" />
  </label>

<br><br>

  <label>
    Precio por item:
    <input type="number" id="precio-item" /> 
  </label>

<br><br>

  <!-- agregado -->
  <label>
    Estado:
    <select id="estado">
      <option value="CA">CA</option>
      <option value="UT">UT</option>
      <option value="NV">NV</option>
      <option value="TX">TX</option>
      <option value="AL">AL</option>
    </select>
  </label>

  <br><br>
  <button type="submit">Calcular</button>
</form>

<br>
<div id="resultado"></div>

<script type="module" src="./src/presenter.js"></script>
  </body>
</html>
